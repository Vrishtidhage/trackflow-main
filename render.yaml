services:
  - type: web
    name: trackflow-api
    runtime: python
    rootDir: server
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=/opt/render/project/src/server uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: trackflow-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@trackflow.local
      - key: ADMIN_PASSWORD
        sync: false

  - type: web
    name: trackflow-client
    runtime: node
    rootDir: client
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: VITE_API_URL
        fromService:
          type: web
          name: trackflow-api
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: trackflow-db
    plan: free
    databaseName: trackflow
    user: trackflow
